<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic Tables and Media</title>
</head>
<body>

    <!-- Semantic Table -->
    <table border="1">
        <thead>
            <tr>
                <th>Roll Number</th>
                <th>Name</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>101</td>
                <td>Alex</td>
            </tr>
            <tr>
                <td>102</td>
                <td>John</td>
            </tr>
            <tr>
                <td>103</td>
                <td>Emma</td>
            </tr>
        </tbody>
    </table>

    <!-- Heading between table and list -->
    <h2>List of medias</h2>

    <!-- Ordered List -->
    <ol>

        <!-- Image -->
        <li>
            <img src="https://picsum.photos/id/123/200/300"
                 alt="Random Image">
        </li>

        <!-- Video -->
        <li>
            <video controls width="320">
                <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
                        type="video/mp4">
            </video>
        </li>

        <!-- Audio -->
        <li>
            <audio controls>
                <source src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg"
                        type="audio/ogg">
            </audio>
        </li>

    </ol>

</body>
</html>
